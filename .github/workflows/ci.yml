name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  API_KEY: ${{ secrets.API_KEY }}

jobs:

  changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - 'translate-ui/src/**'
              - 'translate-ui/build.gradle.kts'
              - 'translate-ui/api/**'

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Spotless check
        run: ./gradlew spotlessCheck

      - name: Detekt
        run: ./gradlew detekt

      - name: Android Lint
        run: ./gradlew :translate:lint :translate-ui:lint

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/detekt/

  api-check:
    name: API Compatibility Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Check API surface
        run: ./gradlew :translate:metalavaCheckCompatibilityRelease :translate-ui:metalavaCheckCompatibilityRelease

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Run unit tests
        run: ./gradlew :translate:testDebugUnitTest :translate-ui:testDebugUnitTest

      - name: Generate coverage report
        run: ./gradlew :translate:koverXmlReportDebug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/reports/kover/

  snapshots:
    name: Paparazzi Snapshot Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3
      - name: Verify Paparazzi snapshots
        run: ./gradlew :translate-ui:verifyPaparazziDebug

      - name: Upload snapshot failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paparazzi-failures
          path: translate-ui/build/paparazzi/failures/

  build:
    name: Assemble
    runs-on: ubuntu-latest
    needs: [ lint, api-check, test ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Assemble release AAR
        run: ./gradlew :translate:assembleRelease :translate-ui:assembleRelease

      - name: Upload AARs
        uses: actions/upload-artifact@v4
        with:
          name: release-aars
          path: "**/build/outputs/aar/*-release.aar"